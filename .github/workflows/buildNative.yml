#@formatter:off
name: Native Build

on:
    workflow_dispatch:
    workflow_call:

jobs:
    build:
        timeout-minutes: 45
        strategy:
            matrix:
                os: [ ubuntu-24.04, windows-latest ]
            fail-fast: false
        env:
            HYDRA_NATIVE_BUILD: true
        runs-on: ${{ matrix.os }}
        steps:
            -   if: startsWith(matrix.os,'ubuntu')
                name: Log free memory
                run: free -s 1 -h -c 3
            -   uses: actions/checkout@v4
                with:
                    # Check out last 15 commits
                    fetch-depth: 15

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'adopt'
                    cache: 'maven'

## Disabled for now because of compromised security: https://github.com/tj-actions/changed-files/issues/2463

#            -   name: "Get changed files in core module"
#                id: changed-files-specific
#                uses: tj-actions/changed-files@v45
#                with:
#                    since_last_remote_commit: true
#                    files: |
#                        core/**
#                        docker/nativeTest/**
#                        .github/workflows/buildNative.yml
#
#            -   if: steps.changed-files-specific.outputs.any_changed == 'true'
#                run: |
#                    echo "::notice::Will build new native image / docker container. Changed files in core since last push:"
#                    echo "${{ steps.changed-files-specific.outputs.all_changed_files }}"

#            -   if: steps.changed-files-specific.outputs.any_changed == 'false'
#                run: |
#                    echo "::notice::Will skip build of native image / docker container. No changed files in core since last push."

            -   name: NativeImage
                uses: graalvm/setup-graalvm@v1
#                if: steps.changed-files-specific.outputs.any_changed == 'true'
                with:
                    version: '25.1'
                    distribution: 'graalvm-community'
                    cache: 'maven'
                    github-token: ${{ secrets.GITHUB_TOKEN }}

            -   name: "Install all with Maven"
#                if: steps.changed-files-specific.outputs.any_changed == 'true'
                run: mvn --batch-mode clean install -pl !org.nzbhydra:linux-amd64-release,!org.nzbhydra:linux-arm64-release,!org.nzbhydra:windows-release,!org.nzbhydra:generic-release -DskipTests -T 1C

            -   name: "Run unit tests"
                run: mvn --batch-mode test -T 1C -pl !org.nzbhydra:tests,!org.nzbhydra.tests:system --fail-at-end

            -   name: "Create test Report"
                uses: dorny/test-reporter@v1
                if: always()
                continue-on-error: true
                with:
                    name: Unit test report
                    path: "**/surefire-reports/*.xml"
                    reporter: java-junit

            -   name: "Run focused native tests"
                if: startsWith(matrix.os,'ubuntu')
                working-directory: ./core
                run: mvn --batch-mode "-Pnative,nativeTest,strictReflection" clean test

            -   name: "Build native image"
#                if: steps.changed-files-specific.outputs.any_changed == 'true'
                working-directory: ./core
                run: |
                    mvn --batch-mode "-Pnative,strictReflection" clean native:compile -DskipTests

            -   name: "Check native startup on Linux"
                if: startsWith(matrix.os,'ubuntu')
                working-directory: ./core
                run: |
                    ./target/core -XX:MissingRegistrationReportingMode=Warn directstart --nobrowser --datafolder "$RUNNER_TEMP/native-startup" > native-startup.log 2>&1 &
                    pid=$!
                    cleanup() {
                      kill "$pid" 2>/dev/null || true
                      wait "$pid" 2>/dev/null || true
                    }
                    trap cleanup EXIT
                    ready=false
                    for attempt in {1..60}; do
                      if ! kill -0 "$pid" 2>/dev/null; then
                        break
                      fi
                      if curl --fail --silent http://127.0.0.1:5076/actuator/health/ping > /dev/null; then
                        ready=true
                        break
                      fi
                      sleep 1
                    done
                    if [ "$ready" != true ]; then
                      cat native-startup.log
                      exit 1
                    fi
                    if grep -E 'Missing[A-Za-z]*Registration|Unable to complete startup initialization' native-startup.log; then
                      cat native-startup.log
                      exit 1
                    fi

            -   name: "Check native startup on Windows"
                if: startsWith(matrix.os,'windows')
                working-directory: ./core
                shell: pwsh
                run: |
                    $stdout = 'native-startup.log'
                    $stderr = 'native-startup.err.log'
                    $process = Start-Process -FilePath '.\target\core.exe' -ArgumentList '-XX:MissingRegistrationReportingMode=Warn', 'directstart', '--nobrowser', '--datafolder', "$env:RUNNER_TEMP\native-startup" -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
                    try {
                      $ready = $false
                      foreach ($attempt in 1..60) {
                        $process.Refresh()
                        if ($process.HasExited) {
                          break
                        }
                        try {
                          Invoke-WebRequest -Uri 'http://127.0.0.1:5076/actuator/health/ping' -UseBasicParsing | Out-Null
                          $ready = $true
                          break
                        } catch {
                          Start-Sleep -Seconds 1
                        }
                      }
                      if (-not $ready) {
                        Get-Content $stdout, $stderr
                        exit 1
                      }
                    } finally {
                      $process.Refresh()
                      if (-not $process.HasExited) {
                        Stop-Process -Id $process.Id -Force
                        $process.WaitForExit()
                      }
                    }
                    if (Select-String -Path $stdout, $stderr -Pattern 'Missing[A-Za-z]*Registration|Unable to complete startup initialization') {
                      Get-Content $stdout, $stderr
                      exit 1
                    }

            -   name: "Report native image size"
                shell: pwsh
                working-directory: ./core
                run: |
                    $executable = if ($IsWindows) { 'target/core.exe' } else { 'target/core' }
                    $size = (Get-Item $executable).Length
                    "Native image size: $size bytes" | Tee-Object -FilePath $env:GITHUB_STEP_SUMMARY -Append

            -   name: "Upload native build diagnostics"
                if: always()
                uses: actions/upload-artifact@v4
                with:
                    name: native-build-diagnostics-${{ matrix.os }}
                    if-no-files-found: ignore
                    retention-days: 14
                    path: |
                        core/target/native-build-output.json
                        core/native-startup*.log

            -   name: "Upload linux artifact"
#                if: steps.changed-files-specific.outputs.any_changed == 'true' && startsWith(matrix.os,'ubuntu')
                if: startsWith(matrix.os,'ubuntu')
                uses: actions/upload-artifact@v4
                with:
                    name: coreLinux
                    path: core/target/core

            -   name: "Upload windows artifact"
#                if: steps.changed-files-specific.outputs.any_changed == 'true' && startsWith(matrix.os,'windows')
                if: startsWith(matrix.os,'windows')
                uses: actions/upload-artifact@v4
                with:
                    name: coreWindows
                    path: core/target/core.exe

            -   name: Store if windows exe was built
#                if: steps.changed-files-specific.outputs.any_changed == 'true' && startsWith(matrix.os,'windows')
                if: startsWith(matrix.os,'windows')
                run: echo "WINDOWS_BUILT=true" >> $GITHUB_ENV

            -   name: "Copy artifact to include folder"
#                if: steps.changed-files-specific.outputs.any_changed == 'true' && startsWith(matrix.os,'ubuntu')
                if: startsWith(matrix.os,'ubuntu')
                run: |
                    mv core/target/core ./docker/nativeTest/
                    chmod +x ./docker/nativeTest/core

            -   name: "Login to GitHub Container Registry"
#                if: steps.changed-files-specific.outputs.any_changed == 'true' && startsWith(matrix.os,'ubuntu')
                if: startsWith(matrix.os,'ubuntu')
                uses: docker/login-action@v2
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: "Build and push core container"
#                if: steps.changed-files-specific.outputs.any_changed == 'true' && startsWith(matrix.os,'ubuntu')
                if: startsWith(matrix.os,'ubuntu')
                run: |
                    cp other/wrapper/nzbhydra2wrapperPy3.py ./docker/nativeTest/
                    cd ./docker/nativeTest/
                    docker build -t hydradocker -t ghcr.io/theotherp/hydradocker:latest -t ghcr.io/theotherp/hydradocker:${{ github.ref_name}} -t ghcr.io/theotherp/hydradocker:${{ github.sha }} . --label "version=${{ github.ref_name}}" --label "sha=${{ github.sha }}"
                    docker push ghcr.io/theotherp/hydradocker:latest
                    docker push ghcr.io/theotherp/hydradocker:${{ github.sha }}
